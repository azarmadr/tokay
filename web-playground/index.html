<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokay Web Playground</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background: #121212; color: #e8e8e8; }
    .page { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1 { margin-top: 0; }
    textarea { width: 100%; min-height: 220px; background: #1e1e1e; color: #f8f8f8; border: 1px solid #333; border-radius: 8px; padding: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .output { min-height: 220px; white-space: pre-wrap; background: #0f1115; border: 1px solid #333; border-radius: 8px; padding: 12px; overflow: auto; }
    button { border: none; background: #2563eb; color: white; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #1d4ed8; }
    .footer { margin-top: 24px; font-size: 0.95rem; color: #c0c0c0; }
    .label { margin-bottom: 6px; display: block; font-weight: 600; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Tokay Web Playground</h1>
    <p>Write Tokay code, provide optional input, and run it in the browser.</p>

    <div class="row">
      <div>
        <label class="label" for="code">Tokay Program</label>
        <textarea id="code"># Try a simple parser\nDigit = '0'..'9'+\nDigit.text</textarea>
      </div>
      <div>
        <label class="label" for="input">Input</label>
        <textarea id="input">12345</textarea>
      </div>
    </div>

    <button id="run">Run</button>
    <div class="footer">Output:</div>
    <div id="result" class="output"></div>
    <div class="footer">Build and serve this folder after wasm-pack build: <code>cd web-playground && wasm-pack build --target web && python3 -m http.server 8000</code></div>
  </div>

  <script type="module">
    import init, { run, version } from "./pkg/tokay_web_playground.js";

    async function bootstrap() {
      await init();
      document.getElementById("result").textContent = `Tokay Web Playground ${version()} ready.`;
    }

    document.getElementById("run").addEventListener("click", async () => {
      const code = document.getElementById("code").value;
      const input = document.getElementById("input").value;
      const result = run(code, input);
      document.getElementById("result").textContent = result;
    });

    bootstrap();
  </script>
</body>
</html>
